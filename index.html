<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's Nitro Plog</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- 基础重置与暗黑主题 --- */
        :root {
            --bg-color: #0a0a0a;       /* 极暗的深空灰底色 */
            --text-main: #f5f5f5;      /* 柔和的亮白色文字 */
            --text-muted: #888888;     /* 辅助文字灰色 */
            --card-bg-1: #1a1a1a;      /* 卡片1底色 */
            --card-bg-2: #242424;      /* 卡片2底色 */
            --card-bg-3: #2e2e2e;      /* 卡片3底色 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* --- 页面骨架 --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* --- 首屏介绍区 (Hero) --- */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero p.tag {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .hero h1 {
            font-size: clamp(3rem, 6vw, 6rem); /* 响应式巨型字体 */
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            max-width: 800px;
        }

        /* --- 核心魔法：层叠卡片堆 (The Stacking Cards) --- */
        .projects-stack {
            padding-bottom: 30vh; /* 底部留白，确保最后一张卡片能划过去 */
            display: flex;
            flex-direction: column;
            gap: 40px; /* 滚动前卡片之间的间距 */
        }

        .project-card {
            /* 核心 CSS 魔法：吸顶效果 */
            position: sticky;
            
            height: 75vh;
            border-radius: 32px;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            
            /* 边缘光泽与阴影，打造空间立体感 */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 -20px 40px rgba(0, 0, 0, 0.6); 
            
            transform-origin: top center;
            overflow: hidden;
            
            /* 为后面加入你的背景图做准备 */
            background-size: cover;
            background-position: center;
        }

        /* 重点来了：为了让卡片像阶梯一样层叠，
           我们需要给每张卡片设置不同的 top 值！
           第一张停在最上面，第二张停在第一张下面一点点，以此类推。
        */
        .card-1 { 
            top: 10vh; 
            background-color: var(--card-bg-1); 
            z-index: 1; 
        }
        .card-2 { 
            top: calc(10vh + 30px); /* 露出上面卡片 30px 的边缘 */
            background-color: var(--card-bg-2); 
            z-index: 2; 
        }
        .card-3 { 
            top: calc(10vh + 60px); 
            background-color: var(--card-bg-3); 
            z-index: 3; 
        }

        /* --- 卡片内部排版 --- */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-year {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .card-content h2 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .card-content p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 500px;
        }

        /* 鼠标悬停时的按钮小动画 */
        .btn-view {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            border-radius: 50px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .project-card:hover .btn-view {
            transform: translateX(10px);
        }

    </style>
</head>
<body>

    <div class="container">
        <header class="hero">
            <p class="tag">Will's Photography</p>
            <h1>Capturing the world,<br>one frame at a time.</h1>
        </header>

        <div class="projects-stack">
            
            <article class="project-card card-1">
                <div class="card-header">
                    <span class="card-year">24Q2</span>
                    <span class="card-year">Canon R5</span>
                </div>
                <div class="card-content">
                    <h2>Qinghai</h2>
                    <p>Ta'er Temple, Chaka, Qunjia.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

            <article class="project-card card-2">
                <div class="card-header">
                    <span class="card-year">25Q2</span>
                    <span class="card-year">Nikon Z9</span>
                </div>
                <div class="card-content">
                    <h2>Japan</h2>
                    <p>Tokyo, Fuji Kawaguchiko, Kyoto and Osaka.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

            <article class="project-card card-3">
                <div class="card-header">
                    <span class="card-year">25Q2</span>
                    <span class="card-year">Mini Plog</span>
                </div>
                <div class="card-content">
                    <h2>ChongQing</h2>
                    <p>Yuzhong, Chongqing, China.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

        </div>
    </div>

</body>
</html>
