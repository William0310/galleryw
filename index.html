<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will's Nitro Plog</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="hero">
            <p class="tag">Will's Photography</p>
            <h1>Capturing the world,<br>one frame at a time.</h1>
        </header>

        <div class="projects-stack">
            
            <article class="project-card card-1">
                <div class="card-header">
                    <span class="card-year">24Q2</span>
                    <span class="card-year">Canon R5</span>
                </div>
                <div class="card-content">
                    <h2>Qinghai</h2>
                    <p>Ta'er Temple, Chaka, Qunjia.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

            <article class="project-card card-2">
                <div class="card-header">
                    <span class="card-year">25Q2</span>
                    <span class="card-year">Nikon Z9</span>
                </div>
                <div class="card-content">
                    <h2>Japan</h2>
                    <p>Tokyo, Fuji Kawaguchiko, Kyoto and Osaka.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

            <article class="project-card card-3">
                <div class="card-header">
                    <span class="card-year">25Q2</span>
                    <span class="card-year">Mini Plog</span>
                </div>
                <div class="card-content">
                    <h2>ChongQing</h2>
                    <p>Yuzhong, Chongqing, China.</p>
                    <a href="#" class="btn-view">Explore Project →</a>
                </div>
            </article>

        </div>
    </div>

</body>
</html>
